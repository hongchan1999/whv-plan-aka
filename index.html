<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        if (typeof window !== 'undefined') {
          var originalFetch = window.fetch;
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { /* Ignore overwrite to prevent 'which has only a getter' error */ },
              configurable: true,
              enumerable: true
            });
          } catch(e) {}
          
          // Silencing benign cross-origin errors in the iframe test setup
          window.addEventListener('error', function(e) {
            if (e.message && (e.message.indexOf('Script error') > -1 || e.message.indexOf('Unexpected token') > -1)) {
              e.preventDefault();
              e.stopPropagation();
            }
          }, true);

          window.addEventListener('unhandledrejection', function(e) {
            if (e.reason && (String(e.reason).indexOf('Script error') > -1 || String(e.reason).indexOf('Extension') > -1)) {
              e.preventDefault();
              e.stopPropagation();
            }
          }, true);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
